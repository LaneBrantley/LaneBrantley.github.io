<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        title {
            text-align: center;
            margin-top: 50px;
        }
        h1 {
            text-align: center;
            margin-top: 50px;
            text-size-adjust: large;
        }
        header {
            text-align: center;
        }
        section {
            text-align: left;
            margin-top: 100px;
        }
        footer {
            margin-top: 90%;
            text-align: center;
        }
        .darkbutton {
            background-color: brown;
            color: beige;
        }
        .darkinput {
            background-color:cadetblue;
        }
        .inputtext {
            color:blueviolet;
        }
        .inputfont {
            font: x-small;
        }
        .inputsize {
            font-size: large;
        }
    </style>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="title">Activity 3 - HTML Forms</title>
</head>
<body>
    <header class="header">
        Lane Brantley, ITIS3135-091
    </header>
    <main>
        <h1>Activity 3 - HTML Forms</h1>
        <section class="section">
            <form action="#">
                <fieldset>
                    <legend>What is your name (only letters)?</legend>
                    <label><input class="darkinput" type="text" name="name" placeholder="name" pattern="[A-Za-z]" required></label>
                    <input type="reset">
                </fieldset>
                <fieldset>
                    <legend>What is your phone number (only numbers, no dashes)?</legend>
                    <label><input class="inputsize" type="number" name="name" placeholder="phone number" pattern="[0-9]+" required></label>
                    <input type="reset">
                </fieldset>
                <fieldset>
                    <legend>What is your email address?</legend>
                    <label><input class="inputtext" type="text" name="email address" placeholder="email address" required></label>
                    <input type="reset">
                </fieldset>
                <fieldset>
                    <legend>What is your age?</legend>
                    <label><input class="inputfont" type="radio" name="age" value="18-27" checked>18-27</label>
                    <label><input class="inputfont" type="radio" name="age" value="28-35">28-35</label>
                    <label><input class="inputfont" type="radio" name="age" value="36-45">36-45</label>
                    <label><input class="inputfont" type="radio" name="age" value="46+">46+</label>
                    <input type="reset">
                </fieldset>
                <fieldset>
                    <legend>What are your credentials?</legend>
                    <input type="checkbox" name="credentials" value="highschool diploma"> <label>Highschool diploma</label>
                    <input type="checkbox" name="credentials" value="college degree"> <label>College Degree</label>
                    <input type="checkbox" name="credentials" value="work experience"> <label>Work Experience</label>
                    <input type="reset">
                </fieldset>
                <fieldset>
                    <label>Choose your coding level:</label>
                    <select name="level" id="level">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">intermediate</option>
                        <option value="advanced">advanced</option>
                        <option value="expert">expert</option>
                    </select>
                </fieldset>
                <button class="darkbutton" type="submit" >Submit</button>
            </form>
        </section>
    </main>
    <footer class="footer">
        Created by brantleysoftware
    </footer>
</body>
</html>
